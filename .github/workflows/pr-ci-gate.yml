name: PR CI Gate
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  biome:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup-node-npm
      - run: npx biome ci --reporter=github .

  build:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup-node-npm
      - run: npm run build

  jest:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup-node-npm
      - run: npm test

  cdk-synth:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup-node-npm
      - run: npx cdk synth
        env:
          AWS_ORGANIZATION_ID: 'o-aaaaaaaaaa'
          AWS_MANAGEMENT_ACCOUNT_ID: '111111111111'
          AWS_LOG_ARCHIVE_ACCOUNT_ID: '222222222222'
          AWS_CLOUDTRAIL_LOG_BUCKET_NAME: 'cloudtrail-logs-222222222222-ap-northeast-1'
          AWS_CLOUDTRAIL_KMS_KEY_ARN: 'arn:aws:kms:ap-northeast-1:222222222222:key/00000000-0000-0000-0000-000000000000'

  pr-ci-gate:
    needs:
      - biome
      - build
      - jest
      - cdk-synth
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-slim
    steps:
      - name: Verify CI results
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS" | jq -e '
            all(
              .[];
              .result == "success" or .result == "skipped"
            )
          '
